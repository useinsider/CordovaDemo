<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content: https:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="css/message-center.css">
        <title>App Cards</title>
    </head>
    <body>
        <div class="app center">
            <div class="header">
                <div class="insider-logo">
                    <img src="img/insider-logo.png" />
                </div>
                <div class="description">
                    <div class="insider-title">App Cards</div>
                    <p>View and manage your app cards</p>
                </div>
            </div>

            <div class="back-button-container">
                <input class="insider-button" type="button" id="backButton" value="Back to Home" />
                <input class="insider-button delete-all-button" type="button" id="deleteAllButton" value="Delete All App Cards" style="display: none;" />
            </div>

            <div id="loading" class="loading">Loading app cards...</div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="messagesContainer" class="messages-container"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>No app cards available</p>
            </div>
        </div>

        <script src="cordova.js"></script>
        <script src="js/message-center.js"></script>
    </body>
</html>
